services:
  - type: web
    name: fenkell-rx-pharmacy
    runtime: python
    pythonVersion: "3.11.0"
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "10000"
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        value: "Fenkell Rx Pharmacy <no-reply@fenkellrxpharmacy.com>"
      - key: ADMIN_PASSWORD
        sync: false
